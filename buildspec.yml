version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo Installing dependencies...
      - npm install -g @angular/cli
      - npm install

  pre_build:
    commands:
      - echo Running tests (optional)...
      - npm run test -- --watch=false --browsers=ChromeHeadless || true

  build:
    commands:
      - echo Building Angular app...
      - npm run build --prod

  post_build:
    commands:
      - echo Build completed successfully

artifacts:
  base-directory: dist
  files:
    - '**/*'

cache:
  paths:
    - node_modules/**/*
